/* 🌙 DARK MODE */
body.dark {
  background: #121212;
  color: white;
}

body.dark section {

body.dark nav {

header::before {
  content: "";
  position: absolute;
  inset: 0;

}

header div {
  position: relative;
  display: inline-block;
  padding: 40px;

nav {

  background: white;
  max-width: 700px;
  margin: 20px auto;
  padding: 20px;
  border-radius: 8px;
  transition: 0.3s;
}

/* BUTTONS */
a.button {
  display: block;
  margin: 15px 0;
  padding: 12px;
  background: #444;
  color: white;
  text-decoration: none;
  border-radius: 6px;
  text-align: center;
}

/* DARK MODE BUTTON */
.toggle {
  position: fixed;
  top: 10px;
  right: 10px;
  z-index: 9999;
  background: #222;
  color: white;
  border: none;
  padding: 10px 12px;
  border-radius: 6px;
  cursor: pointer;
